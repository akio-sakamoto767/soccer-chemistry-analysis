[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "backend"
source = "backend"

[services.build]
builder = "nixpacks"

[services.deploy]
startCommand = "uvicorn app:app --host 0.0.0.0 --port $PORT"