[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && gunicorn minimal_app:app --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/health"

[[services]]
name = "backend"
source = "backend"

[services.build]
buildCommand = "cd backend && pip install -r requirements.txt"

[services.deploy]
startCommand = "cd backend && gunicorn minimal_app:app --bind 0.0.0.0:$PORT"